name: validate
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Lint the published list
        run: uv run python -m lockedin_filters.lint dist/lockedin-youtube.txt --supplement data/supplement.txt
      - name: Run tests
        run: uv run pytest -q
